<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BANGBOAI 智能体 - HuaAngel Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--t:#1a1a2e;--t2:#666;--hdr:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);--r:12px;--s:0 2px 8px rgba(0,0,0,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.nav{background:var(--hdr);padding:0 24px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;font-size:18px;font-weight:700}
.nav-brand span{color:#60a5fa}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-links a{color:rgba(255,255,255,0.75);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:14px;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(255,255,255,0.12)}
.hero{background:var(--hdr);padding:40px 24px;text-align:center;color:#fff;border-radius:0 0 32px 32px}
.hero h1{font-size:26px;font-weight:800;margin-bottom:4px}
.hero h1 span{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:14px;color:rgba(255,255,255,0.5)}
.container{max-width:800px;margin:-16px auto 40px;padding:0 20px;position:relative;z-index:1}

/* Daily Report Card */
.daily-card{background:linear-gradient(135deg,#1e3a5f,#1a1a2e);border-radius:12px;padding:16px;margin-bottom:16px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.daily-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:15px;font-weight:700}
.daily-date{font-size:12px;color:rgba(255,255,255,0.6);font-weight:400}
.daily-body{font-size:13px;line-height:1.6}
.daily-loading{color:rgba(255,255,255,0.6);font-style:italic}
.daily-summary{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:8px}
.daily-section-title{font-weight:600;font-size:13px;margin:6px 0 4px;opacity:0.9}
.daily-list{list-style:none;padding:0;margin:0}
.daily-list li{padding:3px 0;font-size:12px;color:rgba(255,255,255,0.85)}
.daily-product{padding:3px 0;font-size:12px;color:rgba(255,255,255,0.85)}
.daily-btn{width:100%;margin-top:10px;padding:8px;border:1px solid rgba(255,255,255,0.2);border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;font-size:13px;cursor:pointer;transition:all .2s}
.daily-btn:hover{background:rgba(255,255,255,0.15)}

.chat-box{background:var(--card);border-radius:var(--r);box-shadow:var(--s);display:flex;flex-direction:column;height:520px;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;animation:fadeIn .2s}
.msg.user{background:#005bff;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:#f0f2f5;color:var(--t);align-self:flex-start;border-bottom-left-radius:4px}
.msg.time{text-align:center;font-size:11px;color:var(--t2);background:transparent;align-self:center}
.msg.typing{background:#f0f2f5;color:var(--t2);align-self:flex-start;font-style:italic}
.msg.system{background:#e8f5e9;color:#2e7d32;align-self:center;font-size:13px;text-align:center;max-width:90%}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.chat-input{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #e0e0e0}
.chat-input textarea{flex:1;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;resize:none;outline:none;font-family:inherit;max-height:100px}
.chat-input textarea:focus{border-color:#005bff}
.chat-input button{width:60px;background:#005bff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:24px;transition:all .2s}
.chat-input button:hover{background:#0047cc}
.chat-input button:disabled{opacity:.5}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--t2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;line-height:1.6}
@media(max-width:600px){.nav-links a{font-size:12px;padding:4px 8px}.chat-box{height:460px}}
</style>
</head>
<body>

<div class="nav"><div class="nav-inner">
<a href="/" class="nav-brand">Hua<span>Angel</span></a>
<div class="nav-links">
<a href="/">首页</a><a href="/listing-upload">📦 赛盒上传</a><a href="/bangboai" class="active">🤖 BANGBOAI</a>
<a href="/dashboard">📊 看板</a><a href="/pricing">💰 定价</a><a href="/user">👁 用户</a>
</div></div></div>

<div class="hero"><h1>🤖 <span>BANGBOAI</span> 智能体</h1><p>跨境电商AI助手，每日运营数据分析</p></div>

<div class="container">

<!-- Daily Report Card -->
<div class="daily-card" id="dailyCard" style="display:none">
  <div class="daily-header">
    <span>📊 每日运营数据</span>
    <span class="daily-date" id="dailyDate"></span>
  </div>
  <div class="daily-body" id="dailyBody">
    <div class="daily-loading">加载中...</div>
  </div>
  <button class="daily-btn" onclick="sendDailyReport()">🤖 发送到聊天分析</button>
</div>

<div class="chat-box" id="chatBox">
<div class="chat-msgs" id="chatMsgs">
<div class="empty-state" id="emptyState">
<div class="icon">🤖</div>
<p>你好！我是 BANGBOAI 智能体。<br>有什么跨境电商运营问题需要帮忙？<br><small style="color:#999">试试说"今天数据怎么样"</small></p>
</div>
</div>
<div class="chat-input">
<textarea id="input" rows="1" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<button id="sendBtn" onclick="send()">➤</button>
</div>
</div>
</div>

<script>
var API="/api/bangboai/chat.js";
var chatMsgs=document.getElementById("chatMsgs");
var input=document.getElementById("input");
var btn=document.getElementById("sendBtn");
var emptyState=document.getElementById("emptyState");

function addMsg(text,role){
  if(emptyState)emptyState.style.display="none";
  var div=document.createElement("div");
  div.className="msg "+role;
  div.textContent=text;
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
}

function addTyping(){
  var div=document.createElement("div");
  div.className="msg typing";
  div.id="typing";
  div.textContent="BANGBOAI 正在思考...";
  chatMsgs.appendChild(div);
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
}

function removeTyping(){
  var el=document.getElementById("typing");
  if(el)el.remove();
}

// === Daily Report Integration ===
var DAILY_DATA = null;
var DAILY_DATE = '';

function loadDailyReport() {
  fetch('/data/daily-report.json?_='+Date.now())
    .then(function(r){if(!r.ok)throw Error('No report');return r.json()})
    .then(function(data){
      DAILY_DATA = data;
      var d = new Date(data.analyzed_at);
      DAILY_DATE = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      document.getElementById('dailyDate').textContent = DAILY_DATE;
      document.getElementById('dailyCard').style.display = 'block';
      var body = document.getElementById('dailyBody');
      body.innerHTML = '';
      var summary = document.createElement('div');
      summary.className = 'daily-summary';
      summary.innerHTML = '今日总营收: <strong>$'+data.total_usd_revenue.toFixed(2)+'</strong> | 订单: '+data.total_items+'条 | SKU: '+data.unique_skus+'个';
      body.appendChild(summary);
      var sd = document.createElement('div');
      sd.className = 'daily-section-title'; sd.textContent = '店铺TOP5:';
      body.appendChild(sd);
      var ul = document.createElement('ul'); ul.className = 'daily-list';
      data.store_ranking.slice(0,5).forEach(function(s,i){
        var li = document.createElement('li');
        li.innerHTML = (i+1)+'. '+s.name+' — <strong>$'+s.usd_revenue.toFixed(2)+'</strong> ('+s.units+'件)';
        ul.appendChild(li);
      });
      body.appendChild(ul);
    })
    .catch(function(){});
}

function sendDailyReport(){
  if(!DAILY_DATA) return;
  var d = DAILY_DATA;
  var msg = '📊 今日运营数据分析 ('+DAILY_DATE+')\n\n';
  msg += '总营收: $'+d.total_usd_revenue.toFixed(2)+' | 订单: '+d.total_items+'条\n\n';
  msg += '店铺排名:\n';
  d.store_ranking.slice(0,5).forEach(function(s,i){msg += '  '+(i+1)+'. '+s.name+': $'+s.usd_revenue.toFixed(2)+'\n';});
  msg += '\n品类:\n';
  d.category_breakdown.forEach(function(c){msg += '  '+c.category+': $'+c.usd_revenue.toFixed(2)+'\n';});
  msg += '\n销售额TOP3:\n';
  d.top_products.slice(0,3).forEach(function(p,i){
    var pr = p.est_profit>0?'+$'+p.est_profit.toFixed(0):'-$'+Math.abs(p.est_profit).toFixed(0);
    msg += '  '+(i+1)+'. '+(p.client_sku||p.sku)+': $'+p.usd_revenue.toFixed(2)+' ('+pr+')\n';
  });
  input.value = msg;
  send();
}

function send(){
  var text=input.value.trim();
  if(!text)return;

  // Handle data questions locally
  var t = text.toLowerCase();
  if((t.indexOf('数据')>=0||t.indexOf('分析')>=0||t.indexOf('今天')>=0||t.indexOf('每日')>=0) && DAILY_DATA) {
    sendDailyReport();
    return;
  }

  addMsg(text,"user");
  input.value="";
  btn.disabled=true;
  addTyping();
  
  fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:text})})
  .then(function(r){return r.json()})
  .then(function(data){
    removeTyping();
    btn.disabled=false;
    var answer=data.answer||data.message||data.text||"服务暂时不可用";
    addMsg(answer,"bot");
  })
  .catch(function(e){
    removeTyping();
    btn.disabled=false;
    addMsg("连接失败: "+e.message,"bot");
  });
}

loadDailyReport();
</script>
</body>
</html>
