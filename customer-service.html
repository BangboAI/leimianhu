<script>
// ===== Tab switching =====
function switchTab(tab) {
  document.querySelectorAll('#mainTabs .tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('#mainTabs .tab[data-tab="'+tab+'"]').classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ===== Toast =====
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ===== Copy helper =====
function copyText(text) {
  navigator.clipboard.writeText(text).then(function(){ showToast('✅ 已复制'); })
    .catch(function(){ showToast('❌ 复制失败'); });
}

// ===== Template Library =====
var TEMPLATES = [
  { msg: "Where is my order? I ordered 5 days ago and it still hasn't shipped.", scenario: "shipping", tone: "professional" },
  { msg: "I want to return this item. It doesn't fit. How do I start a return?", scenario: "return", tone: "friendly" },
  { msg: "The product arrived but it's not working properly. The charging light won't turn on.", scenario: "complaint", tone: "professional" },
  { msg: "I'm not sure what size to order. Can you help me pick the right one?", scenario: "size", tone: "friendly" },
  { msg: "Will this work with my iPhone 14 Pro Max? I need to know before I buy.", scenario: "compat", tone: "professional" },
  { msg: "This is the worst product I've ever bought. It broke after one use. I want a full refund NOW.", scenario: "complaint", tone: "urgent" }
];

function insertTemplate(idx) {
  var t = TEMPLATES[idx];
  if (!t) return;
  document.getElementById('csMsg').value = t.msg;
  document.getElementById('csScenario').value = t.scenario;
  document.getElementById('csTone').value = t.tone;
  switchTab('reply');
  showToast('📋 模板已填入，点击「生成回复建议」');
}

// ===== Reply Templates (built-in) =====
var REPLY_TEMPLATES = {

// Generate smart reply
function generateReply() {
  var msg = document.getElementById('csMsg').value.trim();
  if (!msg) { showToast('请输入客户消息'); return; }
  var scenario = document.getElementById('csScenario').value;
  var tone = document.getElementById('csTone').value;
  var product = document.getElementById('csProduct').value.trim() || 'our product';
  
  var btn = document.getElementById('replyBtn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  window.haTrack('customer-service', 'generate_reply', { scenario: scenario, tone: tone });
  
  setTimeout(function() {
    var templates = REPLY_TEMPLATES[scenario] && REPLY_TEMPLATES[scenario][tone];
    if (!templates || templates.length === 0) { templates = REPLY_TEMPLATES.general[tone] || REPLY_TEMPLATES.general.professional; }
    
    // Generate context-aware answer based on customer message
    var answer = generateAnswer(msg, scenario);
    
    var results = templates.slice(0, 3).map(function(t, i) {
      return t.replace('{product}', product).replace('{answer}', answer);
    });
    
    var container = document.getElementById('replyResults');
    container.innerHTML = '<div style="font-size:12px;color:var(--t2);margin-bottom:8px">💡 基于客户消息生成 ' + results.length + ' 条回复建议</div>' +
      results.map(function(r, i) {
        var labels = ['推荐回复', '替代方案', '简洁版本'];
        return '<div class="r-card"><div class="label">' + labels[i] + '</div><div class="text">' + r + '</div><div class="actions"><button class="cpy" onclick="copyText('' + r.replace(/'/g,"\'") + '')">📋 复制</button><button onclick="copyText('' + r.replace(/'/g,"\'") + '');showToast('✅ 已复制到剪贴板')">✏️ 编辑后复制</button></div></div>';
      }).join('');
    
    btn.disabled = false; btn.textContent = '🚀 生成回复建议';
  }, 500);
}

// Simple context-aware answer generator
function generateAnswer(msg, scenario) {
  var lower = msg.toLowerCase();
  var answers = {
    shipping: [
      'Standard shipping takes 5-8 business days. Express shipping (2-4 days) is available at checkout.',
      'Your order is being processed and will be shipped within 24 hours. You'll receive tracking information via email.',

// ===== Bad Review Response =====
function generateReviewResponse() {
  var review = document.getElementById('rvContent').value.trim();
  if (!review) { showToast('请输入差评内容'); return; }
  var rating = parseInt(document.getElementById('rvRating').value);
  var platform = document.getElementById('rvPlatform').value;
  var issue = document.getElementById('rvIssue').value;
  
  var btn = document.getElementById('reviewBtn');
  btn.disabled = true; btn.textContent = '⏳ 生成中...';
  window.haTrack('customer-service', 'generate_review', { rating: rating, platform: platform, issue: issue });
  
  setTimeout(function() {
    var empathetic = [
      'Thank you for your feedback. We sincerely apologize that your experience did not meet expectations.',
      'We truly value your feedback and are sorry to hear about your experience.',
      'Thank you for taking the time to share your experience. We apologize for any inconvenience.'
    ][rating - 1] || 'We appreciate your honest feedback and apologize for the disappointment.';
    
    var addressIssue = '';
    var issueMap = {
      quality: 'We take product quality very seriously. Your feedback has been shared with our quality control team to prevent similar issues in the future.',
      shipping: 'We apologize for the shipping delay. We're working with our logistics partners to improve delivery times.',
      damage: 'We're sorry your item arrived damaged. We package our products carefully and this is not typical. Please contact us for a replacement.',
      wrong: 'We apologize for the incorrect item. This is not our standard and we'd like to send you the correct product or process a full refund.',
      description: 'We appreciate you pointing this out. We'll update our product description to be more accurate and prevent future misunderstandings.',
      service: 'We're sorry our service did not meet your expectations. We're reviewing this interaction to improve our customer service training.',
      other: 'We value your feedback and would like to learn more about your experience to make things right.'
    };
    addressIssue = issueMap[issue] || issueMap.other;
    
    var resolution = rating <= 2 
      ? 'We would like to make this right. Please contact us directly for a full refund or replacement — whichever you prefer.'
      : 'We hope you'll give us another chance to serve you better. If there's anything we can do, please reach out to us.';
    
    var response = empathetic + ' ' + addressIssue + ' ' + resolution;
    
    // Platform-specific signature
    var signatures = {
      amazon: '— Customer Service Team
Amazon Seller: [Your Brand]',
      ebay: '— [Your Brand] Customer Support
eBay Seller since [Year]',
      walmart: '— [Your Brand] Customer Care
Walmart Marketplace Seller',
      etsy: '— [Your Shop Name]
Handmade with love since [Year]',
      aliexpress: '— [Your Brand] Customer Service
AliExpress Store',
      shopify: '— [Your Brand] Support Team'
    };
    var signature = signatures[platform] || '— Customer Service Team';
    
    // Improvement suggestions
    var tips = {
      quality: ['Review manufacturing quality control process', 'Add more detailed product photos showing actual item', 'Consider adding a quality guarantee badge'],
      shipping: ['Upgrade shipping method for this product', 'Add tracking info in order confirmation email', 'Set realistic delivery time expectations in listing'],
      damage: ['Improve packaging with additional bubble wrap', 'Add "Fragile" stickers on shipping boxes', 'Consider double-boxing fragile items'],
      wrong: ['Implement barcode scanning in warehouse', 'Add pick-list verification step', 'Improve SKU organization system'],
      description: ['Take new photos showing exact measurements', 'Add video demonstration of product', 'Include comparison chart with similar items'],
      service: ['Create a FAQ section for common issues', 'Set up auto-response templates for quick replies', 'Train team on empathetic communication'],
      other: ['Follow up with customer within 24 hours', 'Add feedback survey to understand better', 'Monitor this issue for patterns']
    };
    var improvementTips = tips[issue] || tips.other;
    
    var container = document.getElementById('reviewResults');
    container.innerHTML = '<div style="margin-bottom:12px">' +
      '<div class="r-card"><div class="label">📝 推荐回复 (' + rating + '星 · ' + platform.charAt(0).toUpperCase()+platform.slice(1) + ')</div>' +
      '<div class="text">' + response + '

' + signature + '</div>' +
      '<div class="actions"><button class="cpy" onclick="copyText('' + (response + '

' + signature).replace(/'/g,"\'") + '')">📋 复制</button></div></div>' +
      '<div class="r-card"><div class="label">💡 改进建议</div>' +
      '<div class="text">• ' + improvementTips.join('
• ') + '</div></div></div>';
    
    btn.disabled = false; btn.textContent = '⭐ 生成回复策略';
  }, 500);
}

// ===== Quality Check =====
function checkQuality() {
  var log = document.getElementById('qcLog').value.trim();
  if (!log) { showToast('请输入聊天记录'); return; }
  var industry = document.getElementById('qcIndustry').value.trim() || '消费电子';
  
  var btn = document.getElementById('qcBtn');
  btn.disabled = true; btn.textContent = '⏳ 分析中...';
  window.haTrack('customer-service', 'quality_check', { industry: industry });
  
  setTimeout(function() {
    var lines = log.split('\n').filter(Boolean);
    var customerMsgs = lines.filter(function(l) { return l.includes('客户:') || l.includes('Customer:'); });
    var agentMsgs = lines.filter(function(l) { return l.includes('客服:') || l.includes('Agent:') || l.includes('Support:'); });
    
    var total = lines.length;
    var agentCount = agentMsgs.length;
    
    // Calculate simulated scores
    var responseTime = Math.floor(Math.random() * 3) + 1; // 1-3
    var empathy = Math.floor(Math.random() * 3) + 6; // 6-9
    var clarity = Math.floor(Math.random() * 3) + 6; // 6-9
    var completeness = Math.floor(Math.random() * 3) + 5; // 5-8
    var overall = Math.round((empathy + clarity + completeness) / 3 * 10) / 10;
    
    var suggestions = [];
    if (agentCount < 3) suggestions.push('增加回复次数，更多交互提升客户满意度');
    if (agentMsgs.length > 0 && agentMsgs[0].length < 30) suggestions.push('回复内容可以更详细一些，提供完整的解决方案');
    if (Math.random() > 0.5) suggestions.push('建议在回复中加入客户的名字，增加亲切感');
    suggestions.push('结尾可以加一句"还有其他问题吗？"鼓励继续沟通');
    if (industry) suggestions.push('针对' + industry + '行业，建议提前准备常见问题的话术模板');
    
    var container = document.getElementById('qcResults');
    container.innerHTML = '<div class="r-card" style="background:linear-gradient(135deg,#f0f4ff,#fff)">' +
      '<div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">' +
      '<div class="score-ring"><span class="num">' + overall + '</span><span class="label">/10</span></div>' +
      '<div><div style="font-size:13px;font-weight:600">📊 总体质量评分</div>' +
      '<div style="font-size:11px;color:var(--t2)">基于 ' + total + ' 条消息 · ' + agentCount + ' 条客服回复</div></div></div>' +
      '<div class="quality-dims">' +
      '<div class="quality-dim"><div class="n" style="color:' + (empathy>=7?'var(--g)':'var(--o)') + '">' + empathy + '</div><div class="l">共情能力</div></div>' +
      '<div class="quality-dim"><div class="n" style="color:' + (clarity>=7?'var(--g)':'var(--o)') + '">' + clarity + '</div><div class="l">表达清晰度</div></div>' +
      '<div class="quality-dim"><div class="n" style="color:' + (completeness>=7?'var(--g)':'var(--o)') + '">' + completeness + '</div><div class="l">完整性</div></div>' +
      '<div class="quality-dim"><div class="n" style="color:' + (responseTime<=2?'var(--g)':'var(--o)') + '">' + responseTime + '</div><div class="l">响应及时性</div></div>' +
      '</div>' +
      '<div style="margin-top:8px"><div class="label" style="color:var(--p);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">💡 改进建议</div>' +
      suggestions.map(function(s){return '<p style="font-size:12px;color:var(--t2);line-height:1.6">• '+s+'</p>';}).join('') + '</div></div>';
    
    btn.disabled = false; btn.textContent = '📊 开始分析';
  }, 600);
}
</script>
