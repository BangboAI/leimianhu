}
@keyframes heroGlow{

}
.hero::after{

}
.hero-inner{position:relative;z-index:1;max-width:720px;margin:0 auto}

}

}

.hero p{color:rgba(255,255,255,0.65);font-size:15.5px;max-width:560px;margin:0 auto;line-height:1.65}

.stat{text-align:center;position:relative}

.stat:last-child::after{display:none}
.stat-num{font-size:28px;font-weight:900;background:linear-gradient(135deg,#a5b4fc,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ===== Animations ===== */

</style>

<script>
// Sticky nav shadow on scroll
const nav=document.getElementById('nav');
const backTop=document.getElementById('backTop');
window.addEventListener('scroll',()=>{
  nav.classList.toggle('scrolled',window.scrollY>20);
  backTop.classList.toggle('show',window.scrollY>400);
});
backTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

// Intersection Observer for fade-in animation
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('animate-in');observer.unobserve(e.target)}
  });
},{threshold:0.1});
document.querySelectorAll('.tool-card,.cta-banner').forEach(el=>observer.observe(el));
</script>

<style>
@keyframes bbFadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bb-btn{position:fixed;bottom:84px;right:24px;width:56px;height:56px;border-radius:50%;

  transition:transform .2s;display:flex;align-items:center;justify-content:center;
  font-weight:700}
.bb-btn:hover{transform:scale(1.1)}
.bb-win{position:fixed;bottom:150px;right:24px;width:380px;height:560px;
  background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);
  z-index:999999;display:none;flex-direction:column;overflow:hidden;
  animation:bbFadeIn .3s ease;max-width:calc(100vw - 48px);max-height:calc(100vh - 180px)}
.bb-win.open{display:flex}
.bb-hdr{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
  padding:14px 18px;font-size:14px;font-weight:700;display:flex;
  justify-content:space-between;align-items:center}
.bb-hdr small{font-weight:400;opacity:.8}
.bb-close{background:none;border:none;color:#fff;cursor:pointer;font-size:16px;opacity:.8}
.bb-msgs{flex:1;overflow-y:auto;padding:14px;background:#f5f7fb;font-size:13px;line-height:1.5}
.bb-msgs .m{margin-bottom:12px;animation:bbFadeIn .3s ease;clear:both}
.bb-msgs .m.bot{text-align:left}
.bb-msgs .m.user{text-align:right}
.bb-msgs .m .b{display:inline-block;padding:10px 14px;border-radius:14px;max-width:85%;word-break:break-word}
.bb-msgs .m.bot .b{background:#fff;color:#333;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.bb-msgs .m.user .b{background:#667eea;color:#fff;border-bottom-right-radius:4px}
.bb-inp{display:flex;padding:10px 12px;border-top:1px solid #eee;gap:8px}
.bb-inp input{flex:1;padding:9px 14px;border:2px solid #e0e0e0;border-radius:20px;outline:none;font-size:13px}
.bb-inp input:focus{border-color:#667eea}
.bb-inp button{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
  border:none;border-radius:20px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600}
@media(max-width:480px){.bb-win{right:12px;left:12px;width:auto;bottom:140px;height:55vh}}
</style>
<button class="bb-btn" onclick="bbToggle()" id="bbBtn" title="打开 BANGBOAI">B</button>
<div class="bb-win" id="bbWin">
  <div class="bb-hdr">
    <span>BANGBOAI <small>· 运营助手</small></span>
    <button class="bb-close" onclick="bbToggle()">✕</button>
  </div>
  <div class="bb-msgs" id="bbMsgs">
    <div class="m bot"><div class="b">你好！我是 BANGBOAI，跨平台跨境电商运营智能体。<br>可以帮你：<br>📝 Listing 批量生成<br>📊 广告数据分析<br>💬 客服自动回复<br>📦 库存诊断<br>有什么可以帮你的？</div></div>
  </div>
  <div class="bb-inp">
    <input id="bbInp" placeholder="输入问题..." onkeydown="if(event.key=='Enter')bbSend()">
    <button onclick="bbSend()">发送</button>
  </div>
</div>
<script>
var BB_URL = window.BANGBOAI_API_URL || '/api/bangboai/chat';
function bbToggle(){
  var w=document.getElementById('bbWin'),b=document.getElementById('bbBtn');
  w.classList.contains('open')?(w.classList.remove('open'),b.style.display='flex'):(w.classList.add('open'),b.style.display='none')
}
function bbSend(){
  var i=document.getElementById('bbInp'),q=i.value.trim();if(!q)return;i.value='';
  bbAddMsg(q,'user');
  var t=bbAddThinking();
  fetch(BB_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})})
    .then(function(r){return r.json()})
    .then(function(d){t.parentNode.removeChild(t);bbAddMsg(d.answer||'(无响应)','bot')})
    .catch(function(e){t.parentNode.removeChild(t);bbAddMsg('网络错误，请重试','bot')})
}
function bbAddMsg(t,r){
  var d=document.createElement('div');d.className='m '+r;
  d.innerHTML='<div class="b">'+t.replace(/\n/g,'<br>')+'</div>';
  document.getElementById('bbMsgs').appendChild(d);d.scrollIntoView({behavior:'smooth'})
}
function bbAddThinking(){
  var d=document.createElement('div');d.className='m bot';
  d.innerHTML='<div class="b" style="color:#999">思考中...</div>';
  document.getElementById('bbMsgs').appendChild(d);d.scrollIntoView({behavior:'smooth'});return d
}
</script>
